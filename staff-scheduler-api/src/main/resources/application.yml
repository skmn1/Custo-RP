spring:
  application:
    name: staff-scheduler-api

  # PostgreSQL configuration (default for development)
  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/staff_scheduler
    driver-class-name: org.postgresql.Driver
    username: scheduler_admin
    password: scheduler_password
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: "SELECT 1"

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    inherit-platform: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

jwt:
  access-secret: staff-scheduler-dev-access-secret-key-min-32-chars!!
  refresh-secret: staff-scheduler-dev-refresh-secret-key-min-32-chars!!
  access-expiry-ms: 900000
  refresh-expiry-ms: 604800000

logging:
  level:
    root: INFO
    com.staffscheduler.api: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

---
# PostgreSQL for development
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/staff_scheduler
    driver-class-name: org.postgresql.Driver
    username: scheduler_admin
    password: scheduler_password
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      auto-commit: true
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        generate_statistics: false
  h2:
    console:
      enabled: false
  sql:
    init:
      mode: always

---
# PostgreSQL for production
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        generate_statistics: false
  h2:
    console:
      enabled: false

logging:
  level:
    root: WARN
    com.staffscheduler.api: INFO
