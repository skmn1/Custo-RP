spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  sql:
    init:
      mode: never
  h2:
    console:
      enabled: false

jwt:
  access-secret: test-access-secret-key-must-be-at-least-32-chars!!
  refresh-secret: test-refresh-secret-key-must-be-at-least-32-chars!!
  access-expiry-ms: 900000
  refresh-expiry-ms: 604800000
